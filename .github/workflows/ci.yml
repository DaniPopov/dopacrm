name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Force JS-based actions (e.g. astral-sh/setup-uv@v6) to use Node 24
# even when they bundle a Node 20 runtime. Removes the deprecation
# warning until the actions ship updated bundles.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Verify lockfile is in sync
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pytest (unit only — no DB required)
        run: uv run pytest backend/tests/unit/ backend/tests/test_health.py -v

  integration-and-e2e:
    name: Backend Integration + E2E
    runs-on: ubuntu-latest
    # Bring up real Postgres + Redis as sidecars. Image tags match
    # docker-compose.dev.yml so CI behaves the same as local dev.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: dopacrm
          POSTGRES_PASSWORD: dopacrm
          POSTGRES_DB: dopacrm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dopacrm -d dopacrm"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # APP_ENV must be one of development/staging/production; treat CI as dev.
      APP_ENV: development
      # E2E tests sign JWTs with this — must be set before the app boots.
      APP_SECRET_KEY: ci-test-secret-key-32-bytes-long-xx
      # Real services — sidecars above.
      NEON_DATABASE_URL: postgresql://dopacrm:dopacrm@127.0.0.1:5432/dopacrm
      REDIS_URL: redis://127.0.0.1:6379/0
      # Required by Settings but not actually hit by integration/E2E tests.
      # Dummy values keep Pydantic happy without spinning up Mongo/RabbitMQ.
      MONGODB_URI: mongodb://127.0.0.1:27017
      MONGODB_DATABASE: dopacrm_ci
      RABBITMQ_URL: amqp://guest:guest@127.0.0.1:5672/
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: dopacrm-ci
      AWS_ACCESS_KEY_ID: ci
      AWS_SECRET_ACCESS_KEY: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Apply Alembic migrations (creates schema + seeds saas_plans)
        run: uv run alembic upgrade head

      - name: Pytest — integration (real Postgres)
        run: uv run pytest backend/tests/integration/ -v

      - name: Pytest — E2E (TestClient + Postgres + Redis)
        run: uv run pytest backend/tests/e2e/ -v

  frontend-test:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install Python deps (for OpenAPI export)
        run: uv sync --frozen

      - name: Verify frontend lockfile is in sync
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Export OpenAPI spec from backend
        run: uv run python -m scripts.export_openapi > /tmp/openapi.json

      - name: Verify api-schema.ts is in sync with backend
        working-directory: frontend
        run: npm run check:api-types

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Vitest
        working-directory: frontend
        run: npx vitest run

  pip-audit:
    name: Python CVE scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: pip-audit (any CVE fails the build)
        # CVE-2026-3219 is in pip itself (no fix released yet). pip is
        # only used by uv/pip-audit at install time — not shipped in
        # our runtime. Remove the ignore once a patched pip ships.
        run: >
          uv run --with pip-audit pip-audit
          --skip-editable
          --ignore-vuln CVE-2026-3219

  npm-audit:
    name: Frontend CVE scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: npm audit (high + critical severity fails the build)
        run: npm audit --audit-level=high

  gitleaks:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          VERSION=8.21.2
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz \
            -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/
          rm gitleaks.tar.gz

      - name: Run gitleaks
        run: gitleaks detect --source . --verbose --redact --no-banner

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: dopacrm-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          tags: dopacrm-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
