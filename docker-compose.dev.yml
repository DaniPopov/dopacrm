# Resource limits mimic a t3.medium EC2 instance (2 vCPU, 4 GB RAM).
# Total container budget: ~1.7 GB / 1.6 vCPU (leaves ~2.3 GB for OS + Docker).
# If a service OOMs here, it will OOM in prod too — fix it before deploying.
#
# Stack composition (post-2026-04 cleanup):
# - Mongo + mongo-express removed: never had a real client (Postgres carries
#   every entity including activity logs). Saved ~576 MB RAM, 2 containers.
# - Loki + Promtail + Grafana removed: dev observability tax outweighs the
#   value for a solo-dev workflow. Production goes straight to CloudWatch +
#   Sentry; dev uses ``docker logs -f backend``. Saved ~384 MB, 3 containers.
# Total reduction: 5 services, ~960 MB, fewer surprises on `make up-dev`.

services:
  # ── App ──────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dopacrm-backend
    env_file:
      - .env.dev
    environment:
      APP_SERVICE_NAME: backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/workspace/backend/app
      - ./backend/scripts:/workspace/backend/scripts
      - ./backend/migrations:/workspace/backend/migrations
      - ./alembic.ini:/workspace/alembic.ini:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dopacrm-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      backend:
        condition: service_started
    mem_limit: 256m
    cpus: 0.2
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dopacrm-worker
    env_file:
      - .env.dev
    environment:
      APP_SERVICE_NAME: worker
    volumes:
      - ./backend/app:/workspace/backend/app
    command: celery -A app.core.celery_app worker -Q messages.whatsapp,messages.media,messages.session,messages.priority -l info -c 2
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 384m
    cpus: 0.3
    restart: unless-stopped

  worker-beat:
    # Celery Beat — single-instance scheduler. MUST be exactly one container.
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dopacrm-worker-beat
    env_file:
      - .env.dev
    environment:
      APP_SERVICE_NAME: worker-beat
    volumes:
      - ./backend/app:/workspace/backend/app
    command: celery -A app.core.celery_app beat -l info -s /tmp/celerybeat-schedule
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 64m
    cpus: 0.05
    restart: unless-stopped

  # ── Datastores ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: dopacrm-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: dopacrm
      POSTGRES_PASSWORD: dopacrm
      POSTGRES_DB: dopacrm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dopacrm -d dopacrm"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    mem_limit: 256m
    cpus: 0.15
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dopacrm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 3s
    mem_limit: 64m
    cpus: 0.05
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: dopacrm-rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    mem_limit: 384m
    cpus: 0.25
    restart: unless-stopped

  # ── UIs ──────────────────────────────────────────────────────────────────────
  flower:
    image: mher/flower:2.0
    container_name: dopacrm-flower
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      FLOWER_PORT: 5555
      FLOWER_BROKER_API: http://guest:guest@rabbitmq:15672/api/
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 128m
    cpus: 0.1
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
