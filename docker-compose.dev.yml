# Resource limits mimic a t3.medium EC2 instance (2 vCPU, 4 GB RAM).
# Total container budget: ~2.7 GB / 2.0 vCPU (leaves ~1.3 GB for OS + Docker).
# If a service OOMs here, it will OOM in prod too — fix it before deploying.

services:
  # ── App ──────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dopacrm-backend
    env_file:
      - .env.dev
    environment:
      APP_SERVICE_NAME: backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/workspace/backend/app
      - ./backend/scripts:/workspace/backend/scripts
      - ./backend/migrations:/workspace/backend/migrations
      - ./alembic.ini:/workspace/alembic.ini:ro
    depends_on:
      mongo:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dopacrm-worker
    env_file:
      - .env.dev
    environment:
      APP_SERVICE_NAME: worker
    volumes:
      - ./backend/app:/workspace/backend/app
    command: celery -A app.core.celery_app worker -Q messages.whatsapp,messages.media,messages.session,messages.priority -l info -c 2
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 384m
    cpus: 0.3
    restart: unless-stopped

  worker-beat:
    # Celery Beat — single-instance scheduler. MUST be exactly one container.
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dopacrm-worker-beat
    env_file:
      - .env.dev
    environment:
      APP_SERVICE_NAME: worker-beat
    volumes:
      - ./backend/app:/workspace/backend/app
    command: celery -A app.core.celery_app beat -l info -s /tmp/celerybeat-schedule
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 64m
    cpus: 0.05
    restart: unless-stopped

  # ── Datastores ───────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: dopacrm-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    command: ["mongod", "--quiet", "--bind_ip_all"]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5m
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 512m
    cpus: 0.3
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: dopacrm-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: dopacrm
      POSTGRES_PASSWORD: dopacrm
      POSTGRES_DB: dopacrm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dopacrm -d dopacrm"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    mem_limit: 256m
    cpus: 0.15
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dopacrm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 3s
    mem_limit: 64m
    cpus: 0.05
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: dopacrm-rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    mem_limit: 384m
    cpus: 0.25
    restart: unless-stopped

  # ── UIs ──────────────────────────────────────────────────────────────────────
  mongo-express:
    image: mongo-express:1
    container_name: dopacrm-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: root
      ME_CONFIG_MONGODB_URL: mongodb://root:root@mongo:27017/?authSource=admin
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongo:
        condition: service_healthy
    mem_limit: 64m
    cpus: 0.05
    restart: unless-stopped

  flower:
    image: mher/flower:2.0
    container_name: dopacrm-flower
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      FLOWER_PORT: 5555
      FLOWER_BROKER_API: http://guest:guest@rabbitmq:15672/api/
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 128m
    cpus: 0.1
    restart: unless-stopped

  # ── Observability (logs) ─────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.2.0
    container_name: dopacrm-loki
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    mem_limit: 192m
    cpus: 0.1
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.2.0
    container_name: dopacrm-promtail
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-data:/tmp
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      loki:
        condition: service_healthy
    mem_limit: 64m
    cpus: 0.05
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: dopacrm-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_LOG_LEVEL: warn
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    depends_on:
      loki:
        condition: service_healthy
    mem_limit: 128m
    cpus: 0.1
    restart: unless-stopped

volumes:
  mongo-data:
  postgres-data:
  redis-data:
  rabbitmq-data:
  loki-data:
  promtail-data:
  grafana-data:
